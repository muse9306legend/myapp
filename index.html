<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>바로가기 앱</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: rgba(255, 255, 255, .07);
      --panel-line: rgba(255, 255, 255, .14);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, .72);
      --button: #ffffff;
      --button-text: #121826;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(55, 115, 255, .20), transparent 32rem),
        linear-gradient(180deg, #09101f 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .panel {
      width: min(520px, 100%);
      padding: 24px;
      border: 1px solid var(--panel-line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .28);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .buttons {
      display: grid;
      gap: 12px;
    }

    .shortcut {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      width: 100%;
      min-height: 58px;
      padding: 14px 16px;
      border: 0;
      border-radius: 12px;
      background: var(--button);
      color: var(--button-text);
      font: inherit;
      font-weight: 800;
      text-align: left;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .shortcut span {
      display: block;
      min-width: 0;
    }

    .shortcut small {
      display: block;
      margin-top: 3px;
      overflow: hidden;
      color: rgba(18, 24, 38, .65);
      font-size: 12px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .arrow {
      flex: 0 0 auto;
      font-size: 22px;
      line-height: 1;
    }

    .status {
      min-height: 20px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel" aria-label="바로가기">
      <h1>바로가기 앱</h1>
      <p>원하는 주소를 바로 열 수 있게 버튼을 눌러 이동하세요.</p>

      <div class="buttons">
        <button class="shortcut" type="button" data-url="http://egluxnine.iptime.org:10082/">
          <span>
            Egluxnine 서버
            <small>http://egluxnine.iptime.org:10082/</small>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>

        <button class="shortcut" type="button" data-url="https://muse9306legend.github.io/myapp/index.html">
          <span>
            MyApp 웹페이지
            <small>https://muse9306legend.github.io/myapp/index.html</small>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>
      </div>

      <div class="status" id="status">상태: 준비됨</div>
    </section>
  </main>

  <script>
    const status = document.getElementById("status");

    function openShortcut(url) {
      status.textContent = "상태: 이동 중...";
      const opened = window.open(url, "_blank", "noopener,noreferrer");

      if (!opened) {
        window.location.href = url;
      }
    }

    document.querySelectorAll("[data-url]").forEach((button) => {
      button.addEventListener("click", () => openShortcut(button.dataset.url));
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const registration = await navigator.serviceWorker.register("./sw.js?v=2");
          await registration.update();
        } catch (error) {
          console.warn("Service worker registration failed", error);
        }
      });
    }
  </script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>내 첫 앱</title>

  <!-- PWA 핵심: manifest 연결 -->
  <link rel="manifest" href="./manifest.json" />

  <!-- iOS 홈화면 최적화 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    body { margin:0; font-family: system-ui, sans-serif; background:#0b1020; color:#fff; }
    .wrap { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card {
      width:min(520px, 100%);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(10px);
    }
    h1 { margin:0 0 8px; font-size:22px; }
    p { margin:0 0 14px; opacity:.85; line-height:1.5; }
    button {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .small { margin-top:10px; font-size:12px; opacity:.75; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>내 첫 앱</h1>
      <p>이 화면이 폰에 “앱 아이콘”으로 설치됩니다(PWA).</p>
      <button id="btn">버튼 눌러보기</button>
      <div class="small" id="status">상태: 준비됨</div>
    </div>
  </div>

  <script>
    // 버튼 예시
    document.getElementById("btn").addEventListener("click", () => {
      document.getElementById("status").textContent = "상태: 버튼 클릭됨 ✅";
    });

    // 서비스워커 등록(오프라인 캐시의 핵심)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          await navigator.serviceWorker.register("./sw.js");
          // console.log("SW registered");
        } catch (e) {
          // console.log("SW failed", e);
        }
      });
    }
  </script>
</body>
</html>
